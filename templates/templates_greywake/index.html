<style>
    :root {
        /* --- CORE COLORS --- */
        --bg-void: #050505;
        --grid-color: rgba(255, 255, 255, 0.15);
        --panel-bg: rgba(0, 0, 0, 0.85);
        --border-color: #333;
        --border-active: #e2e8f0;
        
        --text-primary: #e2e8f0;
        --text-dim: #64748b;
        --accent-amber: #fbbf24;
        --accent-green: #10b981;
        --accent-red: #0484d1;
        --accent-cyan: #00f3ff;
        
        /* --- VARIABLE MAPPING FOR GATEKEEPER HTML --- */
        /* These map the inline variables used in your HTML to the theme variables */
        --amber: var(--accent-amber);
        --cyan: var(--accent-cyan);
        --off-white: var(--text-primary);

        /* --- FONTS --- */
        --font-head: 'Orbitron', sans-serif;
        --font-mono: 'Fira Code', monospace;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0; padding: 0;
        background-color: var(--bg-void);
        color: var(--text-primary);
        font-family: var(--font-mono);
        height: 100vh; overflow: hidden;
        background-size: 40px 40px;

        background-image: 
            radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 2px),
            radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px),
            radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 2px);
        background-size: 550px 550px, 350px 350px, 250px 250px;
        background-position: 0 0, 40px 60px, 130px 270px;
        animation: star-drift 200s linear infinite;
    }

    /* --- SCROLLBAR STYLING --- */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; border-left: 1px solid #222; }
    ::-webkit-scrollbar-thumb { background: #333; border: 1px solid #000; border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); }

    /* --- LAYOUT --- */
    #app {
        display: grid;
        grid-template-columns: 300px 1fr 300px;
        grid-template-rows: 1fr auto; 
        height: 100vh;
        gap: 16px;
        padding: 16px;
        position: relative;
        z-index: 10;
    }

    /* --- PANELS --- */
    .panel {
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        border-radius: 2px;
        display: flex; flex-direction: column; overflow: hidden;
    }

    #left-panel { grid-column: 1; grid-row: 1 / span 2; }
    #center-panel { 
        grid-column: 2; 
        grid-row: 1; 
        border: none; background: transparent; 
        position: relative; overflow: hidden; 
    }
    #right-panel { grid-column: 3; grid-row: 1 / span 2; }
    #input-container { grid-column: 2; grid-row: 2; }

    /* --- HEADERS (Orbitron) --- */
    h2 {
        font-family: var(--font-head); color: #fff; font-size: 11px; font-weight: 800;
        text-transform: uppercase; letter-spacing: 1px; margin: 0; padding: 12px 16px;
        border-bottom: 1px solid var(--border-color); border-top: 1px solid transparent;
        cursor: pointer; display: flex; justify-content: space-between;
        background: rgba(255, 255, 255, 0.02); transition: all 0.2s;
    }
    h2:hover { background: rgba(255, 255, 255, 0.05); border-top-color: #666; }
    h2::after { content: '[-]'; font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
    h2.collapsed::after { content: '[+]'; }

    .section-content {
        padding: 16px; overflow-y: auto; transition: max-height 0.3s ease;
        max-height: 1000px; 
    }
    .section-content.collapsed { max-height: 0 !important; padding: 0; border-bottom: 1px solid var(--border-color); }

    /* --- NARRATIVE AREA (SCROLL FIX) --- */
    #narrative {
        padding: 20px 40px 60px 40px;
        height: 100%; 
        overflow-y: auto; 
        font-size: 14px; line-height: 1.8; color: #d4d4d8;
    }

    /* Role Colors */
    .message { margin-bottom: 20px; }
    .message p { margin-top: 0; }
    
    /* --- COMMAND INPUT --- */
    #input-container { border: 1px solid var(--border-active); border-radius: 2px; background: #000; padding: 4px; }
    #player-input {
        width: 100%; background: transparent; border: none; color: var(--text-dim);
        font-family: var(--font-mono); font-size: 14px; padding: 12px 16px; outline: none; resize: none;
    }
    #player-input:focus { color: white; }

    /* --- CONTROLS --- */
    .control-grid { display: flex; flex-direction: column; gap: 8px; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button {
        background: transparent; border: 1px solid var(--text-dim); color: var(--text-dim);
        font-family: var(--font-head); font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
        padding: 10px; cursor: pointer; transition: all 0.2s;
    }
    button:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.05); }
    select {
        width: 100%; background: #000; border: 1px solid var(--border-color);
        color: #fff; padding: 8px; font-family: var(--font-mono); font-size: 11px;
        margin-bottom: 8px; outline: none;
    }
    
    /* --- STATS / NAV --- */
    .stat-line { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px dotted #222; }
    .stat-label { color: var(--text-dim); }
    .inventory-item { font-size: 11px; padding: 4px 0; color: #ccc; border-bottom: 1px solid #222; }
    .inventory-item:before { content: '+ '; color: var(--text-dim); }
    
    /* Navigation Headers */
    .sector-header { 
        font-size: 11px; color: var(--text-dim); padding: 4px 0; cursor: pointer; 
        border-left: 2px solid transparent; padding-left: 4px; 
        transition: all 0.2s;
    }
    .sector-header:hover { color: var(--text-primary); border-left-color: var(--accent-cyan); }
    .sector-header.current { color: var(--accent-cyan); border-left-color: var(--accent-cyan); }

    /* Hide all location links by default */
    .location-link { 
        font-size: 10px; color: #666; padding: 4px 0 4px 12px; cursor: pointer; 
        display: none; 
    }
    .location-link:hover { color: #aaa; }

    /* Show links only when the parent group is expanded */
    .sector-group.expanded .location-link {
        display: block; 
    }

    /* Active Mission Font */
    #active-mission {
        font-family: var(--text-primary);
        font-size: 11px;
    }

    /* ----------------------------------------------------- */
    /* --- GATEKEEPER MODAL STYLES (THE FIX) --- */
    /* ----------------------------------------------------- */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.95); /* Opaque background to hide app */
        z-index: 10000;
        display: flex;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(5px);
    }

    .modal-card {
        background: #0a0a0a;
        width: 400px;
        max-width: 90%;
        padding: 40px;
        text-align: center;
        border: 1px solid var(--accent-amber);
        box-shadow: 0 0 30px rgba(251, 191, 36, 0.1);
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    /* Force font since Share Tech Mono isn't loaded */
    .modal-card .panel-header, .modal-card div {
        font-family: var(--font-mono) !important;
    }

    .modal-input, .modal-select {
        width: 100%;
        padding: 12px;
        background: #111;
        border: 1px solid #333;
        color: var(--text-primary);
        font-family: var(--font-mono);
        outline: none;
        transition: border-color 0.2s;
    }

    .modal-input:focus, .modal-select:focus {
        border-color: var(--accent-cyan);
    }

    .btn-submit {
        width: 100%;
        padding: 15px;
        margin-top: 25px;
        cursor: pointer;
        font-family: var(--font-head);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        border: 1px solid var(--accent-amber);
        background: rgba(255, 179, 0, 0.1);
        color: var(--accent-amber);
        transition: all 0.2s;
    }

    .btn-submit:hover {
        background: var(--accent-amber) !important;
        color: #000 !important;
        box-shadow: 0 0 15px var(--accent-amber);
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 1000px) {
        #app { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto auto; padding: 0; gap: 0; }
        #left-panel { grid-column: 1; grid-row: 3; border-top: 1px solid #333; }
        #right-panel { grid-column: 1; grid-row: 4; border-top: 1px solid #333; }
        #center-panel { grid-column: 1; grid-row: 2; height: 50vh; border: none; }
        #input-container { grid-column: 1; grid-row: 1; position: sticky; top: 0; z-index: 100; }
    }
</style>

<script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0';
    env.allowLocalModels = false;
    env.useBrowserCache = true;

<script>
    // --- GLOBAL VARIABLES (THE STONE) ---
    let memoryBank = []; 
    let stoneModel = null;
    let isStoneAwake = false;

// --- 1. AWAKEN (Load the AI) ---
    async function awakenDatacore() {
        if (stoneModel) return; // Already on
        
        console.log("Initializing Neural Core...");
        // This downloads the model (~25MB) once
        stoneModel = await window.pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
        isStoneAwake = true;

        // Inside your initialization function, right after stoneModel is loaded:

        console.log("Seeding Mining Data...");
        for (const entry of MINING_DATA) {
            // We etch it with a specific type so it's easy to manage later if needed
            await etchMemory(entry.content, { type: "mining_data", subject: entry.subject });
        }
        
        console.log("Datacore Online.");
        
        // This is where we inject the Mining Data we discussed
        if (typeof seedMiningData === "function") await seedMiningData();
    }

    // --- 2. ETCH (Write to Memory) ---
    async function etchMemory(text, metadata = {}) {
        if (!isStoneAwake || !text) return;
        
        // Convert text to numbers (Vector)
        const output = await stoneModel(text, { pooling: 'mean', normalize: true });
        
        const memory = {
            id: Date.now() + Math.random(),
            text: text,
            vector: Array.from(output.data), // The math
            metadata: metadata,
            timestamp: Date.now()
        };
        
        memoryBank.push(memory);
    }

    // --- 3. CONSULT (Read from Memory) ---
    async function consultDatacore(queryText) {
        if (!isStoneAwake || memoryBank.length === 0) return [];
        
        // Convert query to numbers
        const output = await stoneModel(queryText, { pooling: 'mean', normalize: true });
        const queryVector = Array.from(output.data);

        // Compare query against all memories (Math: Cosine Similarity)
        const results = memoryBank.map(mem => {
            let dot = 0, magA = 0, magB = 0;
            for (let i = 0; i < queryVector.length; i++) {
                dot += queryVector[i] * mem.vector[i];
                magA += queryVector[i] * queryVector[i];
                magB += mem.vector[i] * mem.vector[i];
            }
            const score = dot / (Math.sqrt(magA) * Math.sqrt(magB));
            return { ...mem, score };
        });

        // Return top 3 matches that are relevant (> 40% match)
        return results.sort((a, b) => b.score - a.score).filter(r => r.score > 0.40).slice(0, 3);
    }

// Global Config
const API_BASE_URL = ""

function wakeUpServer() {
    console.log("📡 Pinging Neural Core...");
    fetch(`${API_BASE_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            message: "PING", 
            warmup: true, // Tell server to just wake up, not generate
        })
    }).then(() => console.log("🟢 Neural Core Online"))
      .catch(e => console.log("⚠️ Core Warmup Failed (Will retry on input)"));
}

function submitGateKeeper() {

    awakenDatacore();
    wakeUpServer();

    // 5. TRANSITION (Fade out Modal, Show App)
    const gatekeeperModal = document.getElementById('gatekeeper');
    gatekeeperModal.style.transition = 'opacity 0.8s ease';
    gatekeeperModal.style.opacity = '0';

    setTimeout(() => {
        // Hide Modal & Show Game
        gatekeeperModal.style.display = 'none';
        document.getElementById('app').style.display = 'grid';

        // 6. AUDIO & ATMOSPHERE
        if (typeof shipHum !== 'undefined') {
            shipHum.play().catch(() =>
                console.log("Ambient audio blocked (User interaction needed first)")
            );
        }

        // 7. UI INITIALIZATION
        const muteBtn = document.getElementById('tts-mute-button');
        if (muteBtn) muteBtn.style.borderColor = 'var(--accent-cyan)';

        if (typeof updateUI === 'function') updateUI();

        // 9. FOCUS INPUT
        const inputField =
            document.getElementById('action-input') ||
            document.getElementById('player-input');

        if (inputField) inputField.focus();

    }, 800);
}

// Execute Director Commands
function displayDirectorCommand(command) {
    
    const narrativeDiv = document.getElementById('narrative');
    if (!narrativeDiv) return;

    if (command.startsWith('/image ')) {
        const url = command.replace('/image ', '').trim(); // Trim any extra space after URL
        
        // 1. Create a container for the image
        const imgContainer = document.createElement('div');
        imgContainer.className = 'narrative-image-container'; // Use a class for CSS
        imgContainer.style.maxWidth = '100%'; 
        imgContainer.style.marginBottom = '20px'; // Add vertical spacing

        // 2. Create the image element
        const img = document.createElement('img');
        img.src = url;
        img.style.width = '100%'; // Ensure it fills the container width
        img.style.height = 'auto'; // Maintain aspect ratio
        
        // 3. Append the image to its container, and the container to the narrative
        imgContainer.appendChild(img);
        narrativeDiv.appendChild(imgContainer);
        
        // 4. Scroll to the new content (important for visibility)
        narrativeDiv.scrollTop = narrativeDiv.scrollHeight; 

    } else if (command.startsWith('/message ')) {
        const textMatch = command.match(/text=`([^`]+)`/);
        const roleMatch = command.match(/role="([^"]+)"/);
        
        if (textMatch && roleMatch) {
            const rawText = textMatch[1]; // Store the original raw text
            const role = roleMatch[1];
            
            let cleanText = rawText;
            
            // If the message role is 'Greywake', it is processed by the engine
            if (role === "Greywake") {
                // NOTE: 'engine' and 'processMessage' must be defined elsewhere
                cleanText = engine.processMessage(rawText);
            }
            
            if (cleanText) {
                // 1. Display the message in the UI
                // NOTE: 'displayMessage' must be defined elsewhere
                displayMessage(cleanText, role);
                
                // 2. TTS Logic: Speak the narrative.
                if (role === "Greywake") {
                    // NOTE: 'stripMarkdownAndHeaders' and 'speakNarrative' must be defined elsewhere
                    const speechText = stripMarkdownAndHeaders(cleanText);
                    speakNarrative(speechText);
                }
            }
            // NOTE: 'updateUI' must be defined elsewhere
            updateUI();
            
            // Scroll to the new content (important for visibility after message)
            narrativeDiv.scrollTop = narrativeDiv.scrollHeight; 
        }
    }
}

// Utility function to remove markdown headers and symbols for better TTS reading
function stripMarkdownAndHeaders(text) {
    // Remove headers (#)
    let cleaned = text.replace(/#\s*.*?\n/g, ''); 
    // Remove leading role names (e.g., ARIA: ")
    cleaned = cleaned.replace(/^(ARIA:|Crumb:)/gm, ''); 
    // Replace double quotes used for commands with plain quotes or remove them
    cleaned = cleaned.replace(/\\"/g, '"'); 
    // Remove all remaining markdown like ** for bold
    cleaned = cleaned.replace(/\*\*/g, '');
    // Replace newline characters with a space for smoother reading
    cleaned = cleaned.replace(/\n/g, ' '); 
    // Trim extra spaces
    cleaned = cleaned.trim();
    return cleaned;

function toggleTtsMute() {
    isMuted = !isMuted;
    const button = document.getElementById('tts-mute-button');

    if (isMuted) {
        window.speechSynthesis.cancel();
        if (button) {
            button.textContent = 'VOICE: OFF';
            button.style.borderColor = 'var(--text-dim)';
            button.style.color = 'var(--text-dim)';
        }
        console.log("[TTS] Voice Muted.");
    } else {
        if (button) {
            button.textContent = 'VOICE: ON';
            button.style.borderColor = 'var(--accent-cyan)';
            button.style.color = 'var(--accent-cyan)';
        }
        // Speak a small confirmation phrase
        speakNarrative("System voice active.");
    }
}

function speakNarrative(text) {
    // Check for mute status first
    if (isMuted) { 
        window.speechSynthesis.cancel();
        return;
    }
    
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        
        const utterance = new SpeechSynthesisUtterance(text);
        
        // --- Voice Logic (Unchanged) ---
        const voices = window.speechSynthesis.getVoices();
        const preferredKeywords = ['Zira', 'Samantha'];
        const targetVoice = voices.find(v => {
            const name = v.name;
            const isEnglish = v.lang.startsWith('en');
            return isEnglish && preferredKeywords.some(keyword => name.includes(keyword));
        });
        const finalVoice = targetVoice || voices.find(v => v.lang.startsWith('en'));
        
        if (finalVoice) {
            utterance.voice = finalVoice;
        }

        // --- Use Live Slider Rate ---
        utterance.pitch = 0.9; 
        utterance.rate = ttsRate; // Uses the continuous slider value
        
        window.speechSynthesis.speak(utterance);
    } else {
        console.warn("[SYSTEM] Text-to-Speech not supported.");
    }
}

class GlyphEngine {
  constructor(gameState) {
    this.gameState = gameState;
    this.active_mission = null;
  }

  // 1. STRIP TAGS
  stripAllTags(text) {
    if (!text) return "";
    let clean = text.replace(
      /\[(?:Morale|Faction|Item|Loc|Vow|Vow_Start|Vow_End|SFX|Ω)\s*:.*?\]/gi,
      ""
    );
    clean = clean.replace(/[\u2500-\u257F\u2010-\u2015]/g, "");
    return clean.replace(/[^\S\n]+/g, " ").trim();
  }

  // 2. PARSE TAGS
parseStateTags(text) {
    const state = {};
    if (!text) return state;
    
    // SFX
    [...text.matchAll(/\[SFX:\s*([^\]|]+)(?:\|.*?)?\]/gi)].forEach(m => {
        if (typeof playAudio === 'function') playAudio(m[1].trim());
    });
    
    // Location
    const locMatch = text.match(/\[Loc:\s*(.+?)\s*\|\s*(.+?)\]/i);
    if (locMatch) {
      state["sector"] = locMatch[1].trim();
      state["location"] = locMatch[2].trim();
    }
    
    // Morale
    const crewMorale = [...text.matchAll(/\[Morale:\s*(Selene|Rigg|Alek|ARIA|Crumb)\s*([+-]?\d+)\]/gi)];
    if (crewMorale.length > 0) {
      state["crew_morale"] = {};
      for (const [, name, change] of crewMorale) state["crew_morale"][name] = parseInt(change, 10);
    }

    // Etched Memory
    const etchedMatches = [...text.matchAll(/\[Ω\s*:\s*(.+?)\s*:\s*(.+?)\]/gi)];
    if (etchedMatches.length > 0) {
      state["etched"] = etchedMatches.map(m => ({
          name: m[1].trim(), truth: m[2].trim(), timestamp: new Date().toISOString()
      }));
    }
    
    // Factions
    const factions = [...text.matchAll(/\[Faction:\s*(UGSA|Consortium|Ember Pact|Proxima|Ouro Authority|Dawning Church|The Watchers|Iron Tide)\s*([+-]?\d+)\]/gi)];
    if (factions.length > 0) {
      state["factions"] = {};
      for (const [, name, change] of factions) state["factions"][name] = parseInt(change, 10);
    }

    // Items
    const items = [...text.matchAll(/\[Item:\s*(.+?)\]/gi)].map(m => m[1]);
    if (items.length > 0) {
      state["items"] = items.map(block => {
        const parts = block.split("|").map(p => p.trim());
        const data = { name: parts[0] };
        for (const p of parts.slice(1)) {
          if (p.includes(":")) {
            const [k, v] = p.split(":", 2).map(x => x.trim());
            data[k.toLowerCase()] = v;
          }
        }
        return data;
      });
    }

    // ─────────────────────────────────────────────────────────────
    // VOW PARSER
    // Handles: [Vow_Start: Name | Faction: ... | Obj: ... | Pay: ...]
    //          [Vow_End: Name | Pay: ... | Pass: True/False]
    // ─────────────────────────────────────────────────────────────

    // Vow_Start
    const vowStartMatches = [...text.matchAll(/\[Vow_Start:\s*(.+?)\]/gi)];
    for (const match of vowStartMatches) {
        const parts = match[1].split("|").map(p => p.trim());
        const vowData = { name: parts[0] };
        for (const p of parts.slice(1)) {
            if (p.includes(":")) {
                const [k, v] = p.split(":", 2).map(x => x.trim());
                vowData[k.toLowerCase()] = v;
            }
        }
        state["mission_start"] = {
            name: vowData.name,
            faction: vowData.faction || null,
            objective: vowData.obj || vowData.objective || "Unknown Objective",
            payment: parseInt(vowData.pay || vowData.payment || "0", 10)
        };
    }

    // Vow_End
    const vowEndMatches = [...text.matchAll(/\[Vow_End:\s*(.+?)\]/gi)];
    for (const match of vowEndMatches) {
        const parts = match[1].split("|").map(p => p.trim());
        const vowData = { name: parts[0] };
        for (const p of parts.slice(1)) {
            if (p.includes(":")) {
                const [k, v] = p.split(":", 2).map(x => x.trim());
                vowData[k.toLowerCase()] = v;
            }
        }
        const passVal = (vowData.pass || vowData.success || "false").toLowerCase();
        state["mission_complete"] = {
            name: vowData.name,
            payment: parseInt(vowData.pay || vowData.payment || "0", 10),
            success: passVal === "true"
        };
    }

    return state;
  }

  // 3. APPLY CHANGES
  applyStateChanges(stateChanges) {
    if (!stateChanges) return;
    const gs = this.gameState;

    // A. Basic State
    if (stateChanges.location) gs.location = stateChanges.location;
    if (stateChanges.sector) gs.sector = stateChanges.sector;
    if (gs.location !== 'Bridge' && gs.location !== 'Engineering' && gs.location !== 'Galley' && gs.location !== 'Med Bay' && gs.location !== 'Cargo Hold' && gs.location !== 'Observation Deck' && gs.location !== 'Holodeck') {
        if (typeof shipHum !== 'undefined') shipHum.pause();
    }

    // B. Item Logic - ATOMIC EXECUTION
    if (stateChanges.items) {
      stateChanges.items.forEach(item => {
        const name = item.name;
        let qty = parseInt(item.quantity);
        if (isNaN(qty)) qty = 1;

        // 1. CREDITS
        if (name.toLowerCase() === 'credits') {
            gs.credits += qty;
            return;
        }

        // 2. UNINSTALL
        if (item.installed && item.installed.toLowerCase() === 'false') {
            const idx = gs.ship_upgrades.findIndex(u => (u.name || u) === name);
            if (idx > -1) gs.ship_upgrades.splice(idx, 1);
            console.log(`[SYSTEM] Uninstalled: ${name}`);
        }

        // 3. UNEQUIP
        if (item.equipped && item.equipped.toLowerCase() === 'false') {
            const owner = item.owner || "David Mercer";
            if (gs.crew_equipment[owner]) {
                const idx = gs.crew_equipment[owner].findIndex(e => (e.name || e) === name);
                if (idx > -1) gs.crew_equipment[owner].splice(idx, 1);
                console.log(`[SYSTEM] Unequipped: ${name}`);
            }
        }

        // 4. INSTALL
        if (item.installed && item.installed.toLowerCase() === 'true') {
            gs.ship_upgrades.push({
                name: name,
                type: item.type || "Ship_Upgrade",
                installed: true,
                quantity: 1,
                value: item.value || 0
            });
            console.log(`[SYSTEM] Installed: ${name}`);
            return; 
        }

        // 5. EQUIP
        if (item.equipped && item.equipped.toLowerCase() === 'true') {
            const owner = item.owner || "David Mercer";
            if (!gs.crew_equipment[owner]) gs.crew_equipment[owner] = [];
            gs.crew_equipment[owner].push({
                name: name,
                type: item.type || "Gear",
                equipped: true,
                owner: owner,
                quantity: 1,
                value: item.value || 0
            });
            console.log(`[SYSTEM] Equipped: ${name}`);
            return; 
        }

        // 6. INVENTORY
        if (qty > 0) {
            const existing = gs.inventory.find(i => (typeof i === 'object' ? i.name : i) === name);
            if (existing && typeof existing === 'object') {
                existing.quantity = (parseInt(existing.quantity) || 1) + qty;
            } else {
                gs.inventory.push({ name: name, type: item.type || "Misc", quantity: qty, value: item.value || 0 });
            }
        } else if (qty < 0) {
            const removeAmt = Math.abs(qty);
            const idx = gs.inventory.findIndex(i => (typeof i === 'object' ? i.name : i) === name);
            if (idx > -1) {
                const invItem = gs.inventory[idx];
                if (typeof invItem === 'object' && invItem.quantity > removeAmt) {
                    invItem.quantity -= removeAmt;
                } else {
                    gs.inventory.splice(idx, 1);
                }
            }
        }
      });
    }

    // C. Other Stats
    if (stateChanges.etched) {
        gs.etched_memory = gs.etched_memory || [];
        stateChanges.etched.forEach(nm => {
            if (!gs.etched_memory.some(m => m.name === nm.name && m.truth === nm.truth)) gs.etched_memory.push(nm);
        });
    }
    if (stateChanges.crew_morale) {
      for (const [n, c] of Object.entries(stateChanges.crew_morale)) if (n in gs.crew_morale) gs.crew_morale[n] += c;
    }
    if (stateChanges.factions) {
      for (const [n, c] of Object.entries(stateChanges.factions)) if (n in gs.factions) gs.factions[n] += c;
    }

    // D. MISSION LOGIC
    if (stateChanges.mission_start) {
        this.active_mission = { ...stateChanges.mission_start, status: "in_progress" };
        this.gameState.active_mission = this.active_mission;
        if (typeof updateMissionUI === 'function') updateMissionUI(this.active_mission);
    }
    if (stateChanges.mission_complete) {
        if (this.active_mission) {
           gs.completed_missions = gs.completed_missions || [];
           gs.completed_missions.push({
             name: this.active_mission.name,
             payment: stateChanges.mission_complete.payment,
             success: stateChanges.mission_complete.success
           });
        }
        this.active_mission = null;
        this.gameState.active_mission = null;
        if (typeof updateMissionUI === 'function') updateMissionUI(null);
    }
  }

  processMessage(rawText) {
    const stateChanges = this.parseStateTags(rawText);
    if (Object.keys(stateChanges).length > 0) this.applyStateChanges(stateChanges);
    if (typeof conversation_log !== 'undefined') {
         conversation_log.push({ role: "", message: rawText, timestamp: new Date().toISOString() });
    }
    const cleanText = this.stripAllTags(rawText);
    return (cleanText && cleanText.length > 0) ? cleanText : null;
  }
}

async function generateAIResponse(playerAction) {
  let game_context = buildContext();
  const gs = gameState || {};
  const narrativeDiv = document.getElementById('narrative');
  let useSystemScroll = true;

  let system_scroll = "";
  const is_ending_simulation = /end (program|simulation)|exit (program|simulation)|stop (program|simulation)/i.test(playerAction);

  if (gs.location === "Holodeck" && !is_ending_simulation) {
    system_scroll = ILLUSIONIST_SCROLL;
    console.log("🜔 Summoning Illusionist...");
  } else {
    system_scroll = GREYWAKE_SCROLL;
    console.log('🜏 Summmoning Prime Scroll...');
  }

  const originalPlayerAction = playerAction;

  // ─────────────────────────────────────────────────────────────────
  // 1. ARCHIVIST CHECK (COMPRESSION)
  // ─────────────────────────────────────────────────────────────────
  if (conversation_log.length >= 12) {
    useSystemScroll = false;
    let logSegment = conversation_log.slice(-3).map(e => `[${e.role}]: ${e.message}`).join('\n');

    game_context = logSegment;
    playerAction = "Compress the provided log.";

    const THE_ARCHIVIST_LITE = `Write in past tense, third person, factual tone.
Include: Locations, Decisions, Crew interactions, Missions, Faction shifts, Acquisitions.
Omit: Credits, tags, Repetition, Unmarked dialogue.
Length: 100–150 words.
Tone: Clinical. Chronological. Observational.
CRITICAL: Output ONLY the narrative summary. No headers.
Log: ${logSegment}`;

    try {
      const response = await fetch(`${API_BASE_URL}/api/archive`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            message: "Compress the provided log.",
            context: logSegment,
            system_instruction: THE_ARCHIVIST_LITE,
            max_tokens: 1000 // Ensure Archivist has space to summarize
        })
      });

      if (!response.ok) throw new Error(`Archivist API Error: ${response.status}`);

      const data = await response.json();
      let rawMessage = data.text; 

      displayMessage(`[Archivist] Memory preserved. ${logSegment.length} → ${rawMessage.length} chars.`, "Archivist");
      speakNarrative(`The ship's memory has been preserved.`);

      gs.compressed_memory = gs.compressed_memory || [];
      gs.compressed_memory.unshift(rawMessage);
      if (gs.compressed_memory.length > 3) gs.compressed_memory.pop();

      fullLog.push(...conversation_log);
      conversation_log = conversation_log.slice(-2);

      return generateAIResponse(originalPlayerAction);

    } catch (error) {
      console.error('Compression API Error:', error);
      displayMessage(`ERROR: ${error.message}`, 'System');
      throw error;
    }
  }

   // Display UI & Log Captain
   displayMessage(playerAction, 'Captain');
   
   const userEntry = {
       role: 'Captain',
       message: playerAction,
       timestamp: new Date().toISOString()
   };

   conversation_log.push(userEntry);
   fullLog.push(userEntry);

   let context = buildContext();

  // ─────────────────────────────────────────────────────────────────
  // 2. MAIN GENERATION LOGIC
  // ─────────────────────────────────────────────────────────────────
  try {
    const response = await fetch(`${API_BASE_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            player_action: playerAction,
            context: context,
            system_prompt: system_scroll,
        })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`API Error: ${response.status} - ${errText}`);
    }

    const data = await response.json();
    let rawMessage = data.text;

    const cleanText = engine.processMessage(rawMessage);

    let role = ""; // Default to generic/narrator

    if (cleanText && cleanText.startsWith("[SYSTEM ALERT]")) {
        role = "System";
        displayMessage(cleanText, role);
        speakNarrative(cleanText); 
    } else if(cleanText) {
        // "Greywake" is the narrator, not ARIA
        role = "Greywake"; 
        displayMessage(cleanText, role);
        speakNarrative(cleanText);
    }
    
    // LOG AS GREYWAKE (Narrator)
    conversation_log.push({
        role: 'Greywake', 
        message: rawMessage,
        timestamp: new Date().toISOString()
    });

    updateUI();

    return { text: cleanText };

  } catch (error) {
    console.error('API Error:', error);
    displayMessage(`ERROR: ${error.message}`, 'System');
    speakNarrative(`Error: ${error.message}`);
    throw error;
  }
}

function displayMessage(text, role) {
  const narrative = document.getElementById('narrative');
  const scroller  = document.getElementById('center-panel') || narrative;
  let msgDiv = document.createElement('div');

 if (role === "Captain") {
    text = "Captain: " + text;
}

   text = marked.parse(text);

 if (role === "Captain") {
    msgDiv.style.color = "#FFD700";
    msgDiv.innerHTML = `${text}`;
  } else if (role === "System") { 
    msgDiv.style.color = "#32CD32"; // green
    msgDiv.innerHTML = `${text}`;
  } else if (role === "Painter") {
    msgDiv.style.color = "#32CD32"; // green
    msgDiv.innerHTML = `${text}`;
  } else if (role === "Archivist") {
    msgDiv.style.color = "#FE8D01";  //orange
    msgDiv.innerHTML = `${text}`;  
  } else {
    msgDiv.style.color = "#66B2FF"; //blue
    msgDiv.innerHTML = `${text}`;
  }

  if (narrative.style.display === "none") {
    narrative.style.display = "block";
  }
  narrative.appendChild(msgDiv);

  // Helper: perform the actual scroll
  const doScroll = () => {
    try { msgDiv.scrollIntoView({ block: 'end' }); } catch (_) {}
    scroller.scrollTop = scroller.scrollHeight;
  };

  // Wait for layout, then for any images inside the message
  requestAnimationFrame(() => {
    const imgs = msgDiv.querySelectorAll('img');
    if (!imgs.length) {
      doScroll();
      return;
    }
    let pending = 0;
    imgs.forEach(img => {
      if (!img.complete) {
        pending++;
        img.addEventListener('load', () => {
          if (--pending === 0) doScroll();
        }, { once: true });
        img.addEventListener('error', () => {
          if (--pending === 0) doScroll();
        }, { once: true });
      }
    });
    if (pending === 0) doScroll();
  });
}

function downloadSave() {

    game_state: gameState,
    conversation_log: conversation_log,
    fullLog: fullLog
  };

  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);

function exportReadableLog() {
  const gs = gameState || {};
  const compressedMemory = gs.compressed_memory || [];
  const lines = [];

  lines.push("======================================================================");
  lines.push("THE GREYWAKE - MISSION LOG");
  lines.push("======================================================================");
  lines.push(`Exported: ${new Date().toLocaleString()}\n`);

  // --- CURRENT STATUS ---
  lines.push("--- CURRENT STATUS ---");
  lines.push(`Location: ${gs.location || "Unknown"}`);
  lines.push(`Sector: ${gs.sector || "Unknown"}`);
  lines.push(`Credits: ${gs.credits ?? 0}\n`);

  // --- CREW MORALE ---
  lines.push("--- CREW MORALE ---");
  for (const [name, value] of Object.entries(gs.crew_morale || {})) {
    lines.push(`  ${name}: ${value >= 0 ? "+" : ""}${value}`);
  }
  lines.push("");

  // --- FACTION STANDING ---
  lines.push("--- FACTION STANDING ---");
  for (const [name, value] of Object.entries(gs.factions || {})) {
    lines.push(`  ${name}: ${value >= 0 ? "+" : ""}${value}`);
  }
  lines.push("");

  // --- INVENTORY ---
  lines.push("--- INVENTORY ---");
  if (gs.inventory?.length) {
    gs.inventory.forEach(item => {
      // FIX: Use item.name to get a readable string, falling back to stringified JSON if no name exists.
      lines.push(`  ${item.name || JSON.stringify(item)}`);
    });
  } else {
    lines.push("  (Empty)");
  }
  lines.push("");

  // --- SHIP SYSTEMS ---
  lines.push("--- SHIP SYSTEMS ---");
  if (gs.ship_upgrades?.length) {
    gs.ship_upgrades.forEach(upgrade => {
      // FIX: Use upgrade.name to get a readable string, falling back to stringified JSON if no name exists.
      lines.push(`  ${upgrade.name || JSON.stringify(upgrade)}`);
    });
  } else {
    lines.push("  (None)");
  }
  lines.push("");

  // --- CREW EQUIPMENT ---
  lines.push("--- CREW EQUIPMENT ---");
  for (const [crew, items] of Object.entries(gs.crew_equipment || {})) {
    const equipped = Array.isArray(items) && items.length
      ? items
          // FIX: Map each item object to its name before joining them into a string.
          .map(item => item.name || JSON.stringify(item))
          .join(", ") 
      : "None";
    lines.push(`  ${crew}: ${equipped}`);
  }
  lines.push("");

  if (compressedMemory.length) {
  lines.push("\n======================================================================");
  lines.push("ARCHIVAL MEMORY");
  lines.push("======================================================================");
  compressedMemory.forEach((entry, i) => {
    lines.push(`\n[ARCHIVE ${i + 1}]`);
    lines.push(entry);
  });
}


lines.push("======================================================================");
lines.push("COMPLETE LOG");
lines.push("======================================================================");

let logSource = fullLog || [];

(logSource).forEach(entry => {  
    lines.push(`\n[${entry.timestamp}] ${entry.role.toUpperCase()}:\n  ${entry.message}`);
});

  lines.push("\n======================================================================");
  lines.push("END OF LOG");
  lines.push("======================================================================");

  return lines.join("\n");
}

// GENERATE IMAGE
window.generateImage = async function () {

  if (!conversation_log || conversation_log.length === 0) {
    console.log('No narrative to visualize yet');
    return;
  }

  // FIX: Safely extract the string. If it's already a string, use it. 
  // Otherwise, check for standard text keys. If all fail, return an empty string, not the object.
  const lastEntry = conversation_log[conversation_log.length - 1];
  const logSegment = typeof lastEntry === 'string' 
      ? lastEntry 
      : (lastEntry.content || lastEntry.message || lastEntry.text || "");

  const THE_PAINTER_LITE = `Read the last log entry.
Do not preface your description.
Remove all dialogue, internal thoughts, and emotion.
Keep only what is visually observable: environment, objects, characters, lighting, composition, atmosphere, and motion.
Describe the scene in 40-80 words as a single visual frame.
Write in present tense, focusing strictly on what a camera would capture. No people.`;

  displayMessage("🖌 Generating Image...", "Painter");

  try {
    const response = await fetch(`${API_BASE_URL}/api/archive`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: logSegment, // Now guaranteed to be a clean string
        system_instruction: THE_PAINTER_LITE,
        max_tokens: 400
      })
    });

    if (!response.ok) throw new Error(`Archivist API Error: ${response.status}`);

    const data = await response.json();

    if (!data.success || !data.image_url) {
      throw new Error("No image returned from server");
    }

    const imageUrl = data.image_url;

    const spacer = document.createElement('div');
    spacer.style.height = '40px';
    spacer.style.width = '100%';
    spacer.style.clear = 'both';

    const img = document.createElement('img');
    img.src = imageUrl;
    img.style.maxWidth = '100%';
    img.style.borderRadius = '8px';
    img.style.boxShadow = '0 4px 6px rgba(0,0,0,0.1)';

    const narrative = document.getElementById('narrative');
    narrative.appendChild(img);
    narrative.appendChild(spacer);

    console.log("🎨 Image generated successfully");

  } catch (e) {
    console.error(`Image generation error: ${e.message}`);

    const errorDiv = document.createElement('div');
    errorDiv.style.color = 'red';
    errorDiv.innerText = `Error: ${e.message}. Is server.py running?`;

    document.getElementById('narrative').appendChild(errorDiv);
  }
};

async function handlePlayerInput() {
  const input = document.getElementById('player-input');
  const action = input.value.trim();
  if (!action) return;

  input.value = '';

  // --- /image command handling ---
  const imageCommandRegex = /^\/image\s+(https?:\/\/\S+)$/i;
  let match = action.match(imageCommandRegex);

  if (match) {
    const imageUrl = match[1];

    // Create a robust spacer element
    const spacer = document.createElement('div');
    spacer.style.height = '40px'; 
    spacer.style.width = '100%';
    spacer.style.clear = 'both'; // Good practice to prevent layout issues
    
    // Display the image
    const img = document.createElement('img');
    img.src = imageUrl;
    img.style.maxWidth = "100%";

    document.getElementById('narrative').appendChild(img);
    document.getElementById('narrative').appendChild(spacer);

    // Command handled, return
    input.disabled = false;
    input.focus();
    return;
  }
  
  // --- /message command handling ---
  const messageCommandRegex = /^\/message\s+text=`([^`]+)`\s+role="([^"]+)"/i;
  match = action.match(messageCommandRegex);

  if (match) {
    const text = match[1];
    const role = match[2]; 

    let cleanText = text; 

    if (role === "Greywake"){
        cleanText = engine.processMessage(text);
    }
    
    if (cleanText) {
      displayMessage(cleanText, role);
    }
    
    updateUI(); 

    input.disabled = false;
    input.focus();
    return;
  }

  // --- Default AI Response Logic ---
  input.disabled = true;
  try {
    await generateAIResponse(action);
  } catch (error) {
    console.error('Error processing action:', error);
  } finally {
    input.disabled = false;
    input.focus();
  }
}

function updateInventoryDisplay() {
  const invDiv = document.getElementById('inventory');
  if (!invDiv) return;

  const visibleInv = gameState.inventory.filter(it => {
    const itemName = getItemName(it);

  });

    ? visibleInv.map(item => `<div class="inventory-item">${getItemName(item)}</div>`).join('')
    : '<div class="inventory-item" style="color: #666;">Empty</div>';

function updateEquipDropdown(fullName) {
  const equipItemSelect = document.getElementById('equip-item');
  if (!equipItemSelect) return;

  equipItemSelect.innerHTML = '';

  const placeholder = document.createElement('option');
  placeholder.value = '';
  placeholder.textContent = '— Select Item —';
  equipItemSelect.appendChild(placeholder);

  const equippedNames = getEquippedNames();

  // 1. Inventory items (filtered to exclude equipped AND ship systems)
  const inventoryItems = gameState.inventory.filter(it => {
    // Get clean name
    const itemName = getItemName(it).replace(/<[^>]*>?/gm, ''); 
    
    // Check if already equipped by someone else
    if (equippedNames.has(itemName)) return false;

    // CRITICAL FIX: Check Type
    const type = (typeof it === 'object') ? (it.type || it.Type) : null;
    
    // If it is a Ship System (Shield, Weapon, Engine, etc.), DO NOT show it here.
    if (type && SHIP_SYSTEM_TYPES.includes(type)) return false;

    return true;
  });
  
  inventoryItems.forEach(item => {
    const opt = document.createElement('option');
    const val = typeof item === 'object' ? item.name : item;
    
    opt.value = val;
    opt.dataset.type = 'inventory';
    opt.innerHTML = getItemName(item); 
    equipItemSelect.appendChild(opt);
  });

  // 2. Equipped items (for this crew member) - Unchanged
  const equipped = Array.isArray(gameState.crew_equipment[fullName])
    ? gameState.crew_equipment[fullName]
    : [];
  
  equipped.forEach(item => {
    const opt = document.createElement('option');
    const val = typeof item === 'object' ? item.name : item;
    
    opt.value = val; 
    opt.dataset.type = 'equipped';
    opt.textContent = `UNEQUIP: ${val}`; 
    equipItemSelect.appendChild(opt);
  });
}

function getEquippedNames() {
  const eq = gameState.crew_equipment || {};
  const all = Object.values(eq).reduce((acc, arr) => acc.concat(arr || []), []);
  return new Set(all.map(x => getItemName(x)));
}

// Helper to normalize item names
function getItemName(item) {
  if (typeof item === 'string') return item;
  if (item && item.name) {
    // Check if it has quantity and display it
    if (item.quantity && parseInt(item.quantity) > 1) {
      return `${item.name} <span style="color: #888; font-size: 0.9em;">(x${item.quantity})</span>`;
    }
    return item.name;
  }
  return String(item);
}

function removeFromInventoryByName(name) {
  const idx = gameState.inventory.findIndex(it => getItemName(it) === name);
  if (idx !== -1) gameState.inventory.splice(idx, 1);
}

function addToInventory(name) {
  const exists = gameState.inventory.some(it => getItemName(it) === name);
  if (!exists) {
    gameState.inventory.push(name);
  }
}

function ensureCrewSlot(owner) {
  gameState.crew_equipment = gameState.crew_equipment || {};
  gameState.crew_equipment[owner] = gameState.crew_equipment[owner] || [];
}

// --- EQUIP / UNEQUIP ---------------------------------------------------

function equipItem(fullName, itemName) {
  if (!fullName || !itemName) return;
  ensureCrewSlot(fullName);

  const eq = gameState.crew_equipment[fullName];
  if (eq.includes(itemName)) return;

  removeFromInventoryByName(itemName);
  eq.push(itemName);

  updateUI();
}

function unequipItem(fullName, itemName) {
  if (!fullName || !itemName) return;
  ensureCrewSlot(fullName);

  const eq = gameState.crew_equipment[fullName];
  const idx = eq.indexOf(itemName);
  if (idx === -1) return;

  eq.splice(idx, 1);
  addToInventory(itemName);

  updateUI();
}

        return;
    }

    displayMessage("🖌 Generating Image...", "System");
    
    // Find the last message that WASN'T from the Captain
    let targetMessage = conversation_log[conversation_log.length - 1].message;
    for (let i = conversation_log.length - 1; i >= 0; i--) {
        if (conversation_log[i].role !== 'Captain') {
            targetMessage = conversation_log[i].message;
            break;
        }
    }

    try {
        const response = await fetch(`${API_BASE_URL}/api/painter`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                prompt: targetMessage 
                // Notice: No API key sent here. The backend handles it.
            })
        });

        const data = await response.json();
        
        if (data.success && data.image_base64) {
            // Create container for proper spacing
            const imgContainer = document.createElement('div');
            imgContainer.style.marginTop = '20px';
            imgContainer.style.marginBottom = '20px';
            imgContainer.style.border = '1px solid var(--accent-cyan)';
            imgContainer.style.padding = '4px';
            imgContainer.style.background = '#000';

            const img = document.createElement('img');
            // Since Imagen 4 now outputs jpeg, ensure the data URI matches
            img.src = `data:image/jpeg;base64,${data.image_base64}`;
            img.style.width = '100%';
            img.style.display = 'block';
            img.style.opacity = '0.9';

            imgContainer.appendChild(img);
            
            const narrative = document.getElementById('narrative');
            narrative.appendChild(imgContainer);
            
            // Scroll into view
            imgContainer.scrollIntoView({ behavior: 'smooth', block: 'end' });
            
            console.log("🎨 Visualized Prompt:", data.refined_prompt);
        } else {
            throw new Error(data.error || "Visual synthesis failed.");
        }
    } catch (e) {
        console.error(`Visualizer Error: ${e.message}`);
        displayMessage(`[ERROR] Visual Feed Corrupted: ${e.message}`, "System");
    }
};

// Toggle Section for drop-down menus
function toggleSection(id) {
  const section = document.getElementById(id);
  if (!section) return;
  section.classList.toggle('collapsed');
}

// Enter to submit
document.getElementById("player-input").addEventListener("keydown", 
  function(event) { 
    if (event.key === "Enter" && !event.shiftKey) { 
      event.preventDefault(); 
      handlePlayerInput(); 
    } 
  });

    </script>
